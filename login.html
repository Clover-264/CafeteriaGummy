<!DOCTYPE html>
<html lang="pt-BR">

<!--HEAD-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar | Delícias &amp; Gostosuras</title>
  <link rel="icon" type="image/x-icon" href="img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<!--BODY-->
<body class="auth-page">
  <div class="auth-card">
    <h2>Entrar</h2>
    <p class="subtitle">Login com e-mail e senha.</p>
    <div id="msg"></div>

<!--FORMULÁRIO COM EMAIL E SENHA-->
    <form id="login-form">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" required maxlength="120" placeholder="seuemail@exemplo.com" />
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="senha" required minlength="6" />
      </div>
      <button class="btn btn-primary btn-block btn-lg" type="submit">Entrar</button>
    </form>

<!--LINKS DE NAVEGAÇÃO-->
    <div class="auth-links">
      <p><a href="recuperar.html">Esqueci minha senha</a></p>
      <p>Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
      <p><a href="index.html">← Voltar pra loja</a></p>
    </div>
  </div>

<!--SCRIPT FAZ FETCH("php/login.php") E SE O LOGIN FUNCIONAR VOLTA PARA A PÁGINA PRINCIPAL-->
  <script>
    function enablePageButtonMotion() {
      document.querySelectorAll("button, .btn").forEach(btn => {
        btn.addEventListener("mousemove", (e) => {
          const r = btn.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width - .5;
          const y = (e.clientY - r.top) / r.height - .5;
          btn.style.transform = `translate(${x * 8}px, ${y * 8}px) scale(1.035)`;
        });
        btn.addEventListener("mouseleave", () => btn.style.transform = "translate(0,0) scale(1)");
      });
    }
    enablePageButtonMotion();

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = new FormData(e.target);
      const msg = document.getElementById("msg");
      try {
        const res = await fetch("php/login.php", { method: "POST", body: data });
        const json = await res.json();
        if (json.ok) {
          msg.innerHTML = `<div class="alert alert-success">Login feito! Redirecionando...</div>`;
          setTimeout(() => location.href = "index.html", 900);
        } else {
          msg.innerHTML = `<div class="alert alert-error">${json.error || "Erro"}</div>`;
        }
      } catch (e) {
        msg.innerHTML = `<div class="alert alert-error">Erro de conexão com servidor</div>`;
      }
    });
  </script>
</body>
</html>
